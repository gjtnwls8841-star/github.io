<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>수진의 인사/노무 자동응답</title>
    <style>
        body { font-family: 'Pretendard', sans-serif; background-color: #f0f2f5; display: flex; justify-content: center; align-items: center; height: 100vh; margin: 0; }
        .chat-container { width: 400px; background: white; border-radius: 15px; box-shadow: 0 10px 25px rgba(0,0,0,0.1); overflow: hidden; }
        .header { background: #4a90e2; color: white; padding: 20px; text-align: center; font-weight: bold; }
        .chat-box { height: 300px; padding: 20px; overflow-y: auto; border-bottom: 1px solid #eee; font-size: 14px; line-height: 1.6; }
        .input-area { display: flex; padding: 15px; }
        input { flex: 1; border: 1px solid #ddd; padding: 10px; border-radius: 5px; outline: none; }
        button { background: #4a90e2; color: white; border: none; padding: 10px 15px; margin-left: 10px; border-radius: 5px; cursor: pointer; }
        .bot-msg { background: #e9ecef; padding: 8px 12px; border-radius: 10px; margin-bottom: 10px; display: inline-block; }
    </style>
</head>
<body>
    <div class="chat-container">
        <div class="header">📋 인사노무 자동응답 센터</div>
        <div class="chat-box" id="chatBox">
            <div class="bot-msg">안녕하세요! 궁금한 인사/노무 키워드를 입력해주세요.<br>(예: 연차, 퇴직금, 수습기간)</div>
        </div>
        <div class="input-area">
            <input type="text" id="userInput" placeholder="질문을 입력하세요..." onkeypress="if(event.keyCode==13) send()">
            <button onclick="send()">전송</button>
        </div>
    </div>

    <script>
        function send() {
            const input = document.getElementById('userInput');
            const chatBox = document.getElementById('chatBox');
            if (input.value.trim() === "") return;

            // 사용자 메시지 표시
            chatBox.innerHTML += `<div style="text-align:right; margin-bottom:10px;"><span style="background:#4a90e2; color:white; padding:8px 12px; border-radius:10px;">${input.value}</span></div>`;

            // 답변 로직 (수진님이 공부하면서 여기에 데이터를 추가하시면 돼요!)
            let reply = "죄송합니다. 아직 학습하지 못한 내용이에요. 노무사 시험 공부 후에 더 채워둘게요!";
            const text = input.value;

            if(text.includes("연차")) {
                reply = "연차유급휴가는 1년간 80% 이상 출근 시 15일이 발생합니다.";
            } else if(text.includes("퇴직금")) {
                reply = "퇴직금은 계속근로기간 1년에 대해 30일분 이상의 평균임금을 지급해야 합니다.";
            } else if(text.includes("수습")) {
                reply = "수습 사용 중인 근로자라도 3개월 이내라면 최저임금의 90%를 지급할 수 있습니다. (단, 단순노무직종 제외)";
            } else if(text.includes("사내규정")) {
                reply = "제1장 총칙
본 규정은 00주식회사(이하 ‘회사’) 임직원의 근로조건 중 근태 및 휴가에 관한 사항을 정하여 공정한 인사 관리를 도모함을 목적으로 한다.

제2장 근무 시간 및 휴게

정규 근무시간: 평일 09:00 ~ 18:00를 원칙으로 하며, 휴게시간은 12:00 ~ 13:00(1시간)로 한다.

유연근무제: 부서장 승인 시 시차출퇴근제(08:00~17:00 등)를 활용할 수 있다.

지각/조퇴: 사유 발생 즉시 인사 시스템을 통해 사전 신고해야 하며, 월 3회 이상 무단 지각 시 복무 위반으로 간주한다.

제3장 휴가 제도

연차 유급휴가: * 1년간 80% 이상 출근 시 15일의 유휴를 부여한다.

근속연수 2년마다 1일을 가산하며, 최대 한도는 25일로 한다.

병가: * 개인 질병 및 부상으로 업무 수행이 어려운 경우 연간 최대 30일까지 무급 병가를 사용할 수 있다.

3일 이상 연속 사용 시 의사 진단서를 제출해야 한다.

특별 유급휴가(경조사):

본인 결혼: 5일

배우자 출산: 10일

부모/배우자 상: 5일

제4장 연차 사용 촉진 제도

회사는 근로기준법에 따라 연차 사용을 촉진할 수 있으며, 촉진 절차를 거쳤음에도 사용하지 않은 연차에 대해서는 보상 의무가 없다.";

            // 봇 답변 표시
            setTimeout(() => {
                chatBox.innerHTML += `<div><span class="bot-msg">${reply}</span></div>`;
                chatBox.scrollTop = chatBox.scrollHeight;
            }, 500);

            input.value = "";
        }
    </script>
</body>
</html>
