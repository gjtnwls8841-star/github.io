<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>수진의 인사관리 시스템</title>
    <style>
        body { font-family: 'Pretendard', -apple-system, sans-serif; background-color: #f0f2f5; display: flex; height: 100vh; margin: 0; overflow: hidden; }
        
        /* [1] 왼쪽 사이드바 디자인 */
        .sidebar { width: 200px; background: #2c3e50; color: white; display: flex; flex-direction: column; padding: 20px 0; }
        .sidebar h2 { font-size: 18px; text-align: center; margin-bottom: 30px; color: #2ecc71; }
        .menu-item { padding: 15px 25px; cursor: pointer; transition: 0.3s; display: flex; align-items: center; gap: 10px; font-size: 15px; }
        .menu-item:hover { background: #34495e; }
        .menu-item.active { background: #27ae60; color: white; font-weight: bold; }

        /* [2] 오른쪽 메인 영역 */
        .main-content { flex: 1; display: flex; justify-content: center; align-items: center; position: relative; }

        /* 챗봇 컨테이너 (기존 디자인 유지) */
        .chat-container { width: 400px; height: 600px; background: white; border-radius: 15px; box-shadow: 0 10px 25px rgba(0,0,0,0.1); overflow: hidden; display: flex; flex-direction: column; }
        .header { background: #27ae60; color: white; padding: 20px; text-align: center; font-weight: bold; }
        .chat-box { flex: 1; padding: 20px; overflow-y: auto; border-bottom: 1px solid #eee; display: flex; flex-direction: column; }
        .quick-buttons { padding: 10px 15px; display: flex; gap: 8px; flex-wrap: wrap; background: #fff; }
        .tag-btn { background: #ebf7ee; color: #27ae60; border: 1px solid #c8e6c9; font-size: 11px; padding: 5px 10px; border-radius: 20px; cursor: pointer; font-weight: bold; }
        .input-area { display: flex; padding: 15px; background: #fff; }
        input { flex: 1; border: 1px solid #ddd; padding: 12px; border-radius: 5px; outline: none; }
        .send-btn { background: #27ae60; color: white; border: none; padding: 10px 20px; margin-left: 10px; border-radius: 5px; cursor: pointer; font-weight: bold; }
        .bot-msg-wrapper { margin-bottom: 15px; text-align: left; }
        .bot-msg { background: #e9ecef; padding: 10px 14px; border-radius: 12px; border-top-left-radius: 2px; display: inline-block; max-width: 80%; font-size: 14px; line-height: 1.5; }
        .user-msg-wrapper { margin-bottom: 15px; text-align: right; }
        .user-msg { background: #2ecc71; color: white; padding: 10px 14px; border-radius: 12px; border-top-right-radius: 2px; display: inline-block; max-width: 80%; font-size: 14px; line-height: 1.5; }
    </style>
</head>
<body>

    <div class="sidebar">
        <h2>HR System</h2>
        <div class="menu-item active">🤖 1. 챗봇</div>
        <div class="menu-item">📚 2. 노무백과 (준비중)</div>
        <div class="menu-item">🧮 3. 계산기 (준비중)</div>
        <div class="menu-item">📝 4. 내 메모 (준비중)</div>
    </div>

    <div class="main-content">
        <div class="chat-container">
            <div class="header">📋 인사노무 자동응답 센터</div>
            <div class="chat-box" id="chatBox">
                <div class="bot-msg-wrapper">
                    <div class="bot-msg">안녕하세요 수진님! 😊<br>왼쪽 메뉴에서 기능을 선택하거나 챗봇에게 물어보세요.</div>
                </div>
            </div>
            <div class="quick-buttons">
                <button class="tag-btn" onclick="quickSend('연차')">#연차</button>
                <button class="tag-btn" onclick="quickSend('퇴직금')">#퇴직금</button>
                <button class="tag-btn" onclick="quickSend('5인미만')">#5인미만</button>
            </div>
            <div class="input-area">
                <input type="text" id="userInput" placeholder="질문을 입력하세요..." onkeypress="if(event.keyCode==13) send()">
                <button class="send-btn" onclick="send()">전송</button>
            </div>
        </div>
    </div>

    <script>
        function send() {
            const input = document.getElementById('userInput');
            const chatBox = document.getElementById('chatBox');
            const text = input.value.trim();
            if (text === "") return;

            chatBox.innerHTML += `<div class="user-msg-wrapper"><div class="user-msg">${text}</div></div>`;

            let reply = "죄송합니다. 해당 내용은 아직 학습 중이에요. <b>'포괄임금', '5인미만'</b> 등의 단어로 질문해주세요!";

            // 기존 답변 로직 통합 (수진님이 정리한 데이터들)
            if(text.includes("연차") || text.includes("휴가")) {
                reply = "<b>[연차 휴가]</b><br>1년 80% 출근 시 15일 부여. 2년마다 1일 가산됩니다.";
            } else if(text.includes("퇴직금")) {
                reply = "<b>[퇴직금]</b><br>1년 이상 근속 & 주 15시간 이상 시 지급됩니다.";
            } else if(text.includes("5인") || text.includes("미만")) {
                reply = "<b>[5인 미만 사업장]</b><br>❌ 미적용: 부당해고 구제신청, 가산수당, 연차휴가";
            } else if(text.includes("포괄") || text.includes("포괄임금")) {
                reply = "<b>[포괄임금제]</b><br>근로시간 산정이 어렵고 명시적 합의가 있어야 인정됩니다.";
            }

            setTimeout(() => {
                chatBox.innerHTML += `<div class="bot-msg-wrapper"><div class="bot-msg">${reply}</div></div>`;
                chatBox.scrollTop = chatBox.scrollHeight;
            }, 500);
            input.value = "";
        }

        function quickSend(word) {
            document.getElementById('userInput').value = word;
            send();
        }
    </script>
</body>
</html>
